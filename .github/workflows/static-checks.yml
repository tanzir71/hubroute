name: Static checks

on:
  pull_request:
  push:

jobs:
  demo-sync:
    name: Demo source sync
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Verify demo build and mirror
        run: npm test
