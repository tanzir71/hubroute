name: Static checks

on:
  pull_request:
  push:

jobs:
  demo-sync:
    name: Demo source sync
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Verify demo build and mirror
        run: npm test

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: pdo_sqlite, sqlite3

      - name: Verify PHP runtime files
        run: php -l index.php && php -l health.php && php -l hubroute.php && php -l maintenance.php

      - name: Package PHP shared-hosting zip
        run: npm run package:php
