<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HubRoute &mdash; Vercel setup</title>
  <meta name="description" content="Initialize the HubRoute Vercel starter database with protected setup credentials.">
  <meta property="og:title" content="HubRoute &mdash; Vercel setup">
  <meta property="og:description" content="Create HubRoute Vercel tables and starter public-tracking data after deployment.">
  <meta property="og:type" content="website">
  <meta name="theme-color" content="#2f56d9">
  <link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%2032%2032'%3E%3Crect%20width='32'%20height='32'%20fill='%232f56d9'/%3E%3Cpath%20d='M6.5%2025.5%20L20.5%2011.5'%20fill='none'%20stroke='%23fff'%20stroke-width='3.4'/%3E%3Cpath%20d='M24%208%20L23.1%2015.7%20L15.9%2014.4%20Z'%20fill='%23fff'/%3E%3Crect%20x='9.3'%20y='19.1'%20width='3.8'%20height='3.8'%20fill='%232f56d9'%20stroke='%23fff'%20stroke-width='1.5'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <main class="shell">
    <nav class="topbar">
      <a href="/">HubRoute Vercel</a>
      <span>First setup</span>
    </nav>
    <section class="panel">
      <h1>Initialize database</h1>
      <p class="muted">Enter the <code>SETUP_SECRET</code> configured in Vercel. This creates tables and inserts starter public-tracking data if the database is empty.</p>
      <form id="setupForm" class="form">
        <label>Setup secret
          <input name="setupSecret" type="password" required>
        </label>
        <button class="btn primary" type="submit">Run setup</button>
      </form>
    </section>
    <section id="result" class="panel muted">Setup has not run yet.</section>
  </main>
  <script>
    const form = document.querySelector("#setupForm");
    const result = document.querySelector("#result");
    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      result.className = "panel muted";
      result.textContent = "Running setup...";
      const response = await fetch("/api/setup", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ setupSecret: form.setupSecret.value })
      });
      const payload = await response.json();
      result.className = payload.ok ? "panel success" : "panel error";
      result.textContent = JSON.stringify(payload, null, 2);
    });
  </script>
</body>
</html>
