<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HubRoute &mdash; track a parcel</title>
  <meta name="description" content="Track a HubRoute parcel with a public tracking code and redacted shipment status.">
  <meta property="og:title" content="HubRoute &mdash; track a parcel">
  <meta property="og:description" content="Enter a HubRoute tracking number to see current parcel status and public event history.">
  <meta property="og:type" content="website">
  <meta name="theme-color" content="#2f56d9">
  <link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%2032%2032'%3E%3Crect%20width='32'%20height='32'%20fill='%232f56d9'/%3E%3Cpath%20d='M6.5%2025.5%20L20.5%2011.5'%20fill='none'%20stroke='%23fff'%20stroke-width='3.4'/%3E%3Cpath%20d='M24%208%20L23.1%2015.7%20L15.9%2014.4%20Z'%20fill='%23fff'/%3E%3Crect%20x='9.3'%20y='19.1'%20width='3.8'%20height='3.8'%20fill='%232f56d9'%20stroke='%23fff'%20stroke-width='1.5'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <main class="shell">
    <nav class="topbar">
      <a href="/">HubRoute Vercel</a>
      <span>Public tracking</span>
    </nav>
    <section class="panel">
      <h1>Track a parcel</h1>
      <form id="trackForm" class="form">
        <label>Tracking number
          <input name="code" autocomplete="off" placeholder="HR260703DHK1A2" required>
        </label>
        <button class="btn primary" type="submit">Track</button>
      </form>
    </section>
    <section id="result" class="panel muted">Enter a tracking number to begin.</section>
  </main>
  <script>
    const form = document.querySelector("#trackForm");
    const result = document.querySelector("#result");
    const params = new URLSearchParams(location.search);
    const pathCode = location.pathname.startsWith("/track/") ? location.pathname.split("/").pop() : "";
    const initial = params.get("code") || pathCode || "";
    form.code.value = initial;

    async function lookup(code) {
      if (!code) return;
      result.className = "panel muted";
      result.textContent = "Loading...";
      const response = await fetch(`/api/track?code=${encodeURIComponent(code)}`);
      const payload = await response.json();
      if (!payload.ok) {
        result.className = "panel error";
        result.textContent = payload.error === "not_found" ? "No parcel found for that tracking number." : payload.error;
        return;
      }
      const parcel = payload.parcel;
      result.className = "panel";
      result.innerHTML = `
        <p class="eyebrow">${parcel.trackingCode}</p>
        <h2>${parcel.status.replaceAll("_", " ")}</h2>
        <p>${parcel.pickupArea} -> ${parcel.dropoffArea}</p>
        <p class="muted">Current hub: ${parcel.currentHub || "Pending"} / ${parcel.paymentMode}</p>
        <div class="timeline">
          ${payload.events.map((event) => `
            <div class="event">
              <strong>${event.type.replaceAll("_", " ")}</strong>
              <span>${event.hub || ""}</span>
              <small>${event.at}</small>
              <p>${event.note || ""}</p>
            </div>
          `).join("")}
        </div>`;
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      lookup(form.code.value.trim());
    });
    lookup(initial);
  </script>
</body>
</html>
